name: shinra_city
description: ShinraCity - Plataforma inteligente de descubrimiento de comercios, promociones y recompensas basada en geolocalización.
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  cloud_functions: ^5.1.3

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Navigation
  go_router: ^13.0.1

  # HTTP & API
  dio: ^5.4.0

  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # Charts
  fl_chart: ^0.66.2

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Storage & Utilities
  shared_preferences: ^2.2.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  intl: 0.20.2

  # Biometric Auth
  local_auth: ^2.1.7

  # Crypto & Security
  crypto: ^3.0.3
  uuid: ^4.3.3
  encrypt: ^5.0.3

  # Utils
  dartz: ^0.10.1
  timeago: ^3.6.0
  flutter_rating_bar: ^4.0.1
  step_progress_indicator: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/ShinraCityLogo.png
    - assets/ShinraCodeLogo1.png
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
